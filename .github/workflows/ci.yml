name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  autoformat:
    # H1 — Struktureller Prettier-Auffang: läuft NUR auf push nach main,
    # nicht in PRs. Wenn der Working-Tree nach `prettier --write .` nicht
    # sauber ist, committet der Bot den Fix als eigenen Commit zurück auf
    # main. Der bestehende `format`-Job bleibt blockierender Zeuge und
    # sollte künftig nie wieder feuern.
    #
    # Schleifenschutz doppelt:
    #   (a) `if:` überspringt Läufe, deren Auslöse-Commit-Message bereits
    #       "prettier autofix" enthält.
    #   (b) Der Push-Schritt setzt Author/Committer auf den Actions-Bot;
    #       ein zweiter Trigger durch denselben Bot-Push wird über (a)
    #       erneut ausgefiltert.
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'prettier autofix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Prettier autofix
        run: npx --yes prettier@3.7.3 --write .
      - name: Commit & push, falls Diff
        run: |
          if git diff --quiet; then
            echo "Kein Diff — nichts zu committen."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: prettier autofix [bot]"
          git push origin HEAD:main

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Doku-Format prüfen (arbeitsweise.md)
        run: npx --yes prettier@3.7.3 --check docs/arbeitsweise.md
      - run: bun run format:check

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard – keine doppelte arbeitsweise.md (Casing)
        run: |
          count=$(git ls-files docs/ | grep -ci 'arbeitsweise\.md$')
          if [ "$count" -gt 1 ]; then
            echo "Fehler: mehrere arbeitsweise.md-Dateien (Groß-/Kleinschreibung):"
            git ls-files docs/ | grep -i 'arbeitsweise\.md$'
            echo "Kanonisch ist NUR docs/arbeitsweise.md (klein)."
            exit 1
          fi
      - name: Guard – keine .env im Git, keine Secrets in getrackten Dateien
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env ist getrackt — bitte enttracken (git rm --cached .env)."
            exit 1
          fi
          if git grep -lE "(SERVICE_ROLE|SECRET|PRIVATE)_?KEY[[:space:]]*=[[:space:]]*[\"'][^\"']" -- ':!*.example' ':!*.md' ':!.github/workflows/ci.yml'; then
            echo "::error::Secret-Muster in getrackter Datei gefunden."
            exit 1
          fi
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run tsc --noEmit
      - run: bun run format:check
      - run: bun run eslint . --max-warnings=0
      - run: bun run vitest run

  db-integration:
    # Hebt einen lokalen Supabase-Stack via CLI hoch und führt die
    # `*.db.test.ts`-Suiten gegen ihn aus. KEINE Tests gegen die
    # Produktiv-Datenbank. Siehe docs/gruendungsdokument.md (Erfolgs-Gate B2a).
    runs-on: ubuntu-latest
    # Blockierend seit 13.07. Bei PostgREST-Schema-Cache-Flake im Setup: Job
    # re-runnen; NICHT wieder stummschalten ohne Prüfer-Entscheid.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: supabase/setup-cli@v1
        with:
          # Gepinnt gegen Rate-Limit-Flake (§96); bewusst manuell heben.
          version: 2.109.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: bun install --frozen-lockfile
      - name: Start local Supabase stack (mit Retry gegen ghcr-Rate-Limit)
        # H4 — bis zu 3 Versuche mit 30 s Pause. Zwischen Versuchen
        # `supabase stop --no-backup` (silent), damit halb gestartete
        # Stacks nicht den zweiten Anlauf blockieren.
        run: |
          set +e
          for i in 1 2 3; do
            echo "supabase start (Versuch $i/3)…"
            supabase start --exclude studio,inbucket,storage-api,imgproxy,edge-runtime,logflare,vector
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "supabase start ok (Versuch $i)."
              exit 0
            fi
            echo "::warning::supabase start fehlgeschlagen (rc=$rc), Aufräumen und in 30 s erneut…"
            supabase stop --no-backup >/dev/null 2>&1 || true
            sleep 30
          done
          echo "::error::supabase start nach 3 Versuchen weiterhin fehlgeschlagen."
          exit 1
      - name: Wait for Supabase to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:54321/rest/v1/ -H "apikey: $(supabase status -o env | grep ANON_KEY | cut -d= -f2)" > /dev/null 2>&1; then
              echo "Supabase is ready"
              break
            fi
            echo "Waiting for Supabase... ($i/30)"
            sleep 2
          done
      - name: Export Supabase env vars
        run: |
          set -euo pipefail
          SUPA_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')
          SUPA_ANON=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2- | tr -d '"')
          SUPA_SVC=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')
          if [ -z "$SUPA_URL" ] || [ -z "$SUPA_ANON" ] || [ -z "$SUPA_SVC" ]; then
            echo "::error::supabase status did not yield API_URL/ANON_KEY/SERVICE_ROLE_KEY"
            supabase status -o env
            exit 1
          fi
          {
            echo "SUPABASE_URL=$SUPA_URL"
            echo "SUPABASE_ANON_KEY=$SUPA_ANON"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPA_SVC"
            echo "SUPABASE_DB_TESTS=1"
          } >> "$GITHUB_ENV"
      - name: Reset DB (apply all migrations cleanly)
        run: |
          supabase db reset --no-seed

          # Final explicit reload (belt-and-suspenders) + settle.
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          psql "$DB_URL" -c "NOTIFY pgrst, 'reload schema';" || true
          sleep 3
      - name: Wait for PostgREST after reset
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$SUPABASE_URL/rest/v1/sessions?select=id&limit=1" \
                 -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                 -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" > /dev/null 2>&1; then
              echo "PostgREST ready after reset"
              exit 0
            fi
            echo "Waiting for PostgREST after reset... ($i/30)"
            sleep 2
          done
          echo "::error::PostgREST not ready after db reset"
          exit 1
      - name: Run DB integration tests
        # Vitest-Positional-Args sind Substring-Filter, KEINE Globs
        # ("src/**/*.db.test.ts" liefert "No test files found"). Stattdessen
        # auf den Dateinamen-Stamm filtern — matcht alle *.db.test.ts.
        run: bun run vitest run .db.test
      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup || true

  e2e:
    # P2 — Playwright-Beweis für den Kassen-Finalize gegen einen lokal
    # via `supabase start` hochgezogenen Stack (gleicher Aufbau wie
    # `db-integration`). Zunächst NON-BLOCKING wegen derselben lokalen-
    # Stack-Flakiness-Risiken (PostgREST-Cache-Reload, Dev-Server-Start).
    # Promotions-Kriterium: blocking, sobald 10 Läufe in Folge grün.
    runs-on: ubuntu-latest
    # H4 — serialisiert die Docker-Pulls hinter db-integration; e2e bleibt
    # NON-BLOCKING bis zur Zehner-Serie (continue-on-error).
    needs: db-integration
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: supabase/setup-cli@v1
        with:
          # Gepinnt gegen Rate-Limit-Flake (§96); bewusst manuell heben.
          version: 2.109.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit
      - name: Start local Supabase stack (mit Retry gegen ghcr-Rate-Limit)
        # H4 — identischer Retry wie im db-integration-Job.
        run: |
          set +e
          for i in 1 2 3; do
            echo "supabase start (Versuch $i/3)…"
            supabase start --exclude studio,inbucket,storage-api,imgproxy,edge-runtime,logflare,vector
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "supabase start ok (Versuch $i)."
              exit 0
            fi
            echo "::warning::supabase start fehlgeschlagen (rc=$rc), Aufräumen und in 30 s erneut…"
            supabase stop --no-backup >/dev/null 2>&1 || true
            sleep 30
          done
          echo "::error::supabase start nach 3 Versuchen weiterhin fehlgeschlagen."
          exit 1
      - name: Wait for Supabase to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:54321/rest/v1/ -H "apikey: $(supabase status -o env | grep ANON_KEY | cut -d= -f2)" > /dev/null 2>&1; then
              echo "Supabase is ready"
              break
            fi
            echo "Waiting for Supabase... ($i/30)"
            sleep 2
          done
      - name: Export Supabase env vars
        run: |
          set -euo pipefail
          SUPA_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')
          SUPA_ANON=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2- | tr -d '"')
          SUPA_SVC=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')
          # Fail fast: leere Werte dürfen NIE still in GITHUB_ENV landen —
          # seit ENV2 (client.ts-Publishable-Fallback) hieße leer = Fallback
          # auf PRODUKTIONS-Supabase, und E2E schreibt (Finalize!).
          for v in SUPA_URL SUPA_ANON SUPA_SVC; do
            [ -n "${!v}" ] || { echo "::error::supabase status Parsing lieferte leeres $v — Format geändert?"; exit 1; }
          done
          {
            echo "SUPABASE_URL=$SUPA_URL"
            echo "SUPABASE_ANON_KEY=$SUPA_ANON"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPA_SVC"
            echo "VITE_SUPABASE_URL=$SUPA_URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$SUPA_ANON"
          } >> "$GITHUB_ENV"
      - name: Reset DB (apply all migrations cleanly)
        run: |
          supabase db reset --no-seed
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          psql "$DB_URL" -c "NOTIFY pgrst, 'reload schema';" || true
          sleep 3
      - name: Run Playwright E2E (starts dev server automatically)
        run: bun run e2e
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup || true
