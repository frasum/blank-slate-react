name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run tsc --noEmit
      - run: bun run eslint . --max-warnings=0
      - run: bun run vitest run

  db-integration:
    # Hebt einen lokalen Supabase-Stack via CLI hoch und führt die
    # `*.db.test.ts`-Suiten gegen ihn aus. KEINE Tests gegen die
    # Produktiv-Datenbank. Siehe docs/gruendungsdokument.md (Erfolgs-Gate B2a).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: bun install --frozen-lockfile
      - name: Start local Supabase stack
        run: supabase start --exclude studio,inbucket,storage-api,imgproxy,edge-runtime,logflare,vector
      - name: Wait for Supabase to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:54321/rest/v1/ -H "apikey: $(supabase status -o env | grep ANON_KEY | cut -d= -f2)" > /dev/null 2>&1; then
              echo "Supabase is ready"
              break
            fi
            echo "Waiting for Supabase... ($i/30)"
            sleep 2
          done
      - name: Export Supabase env vars
        run: |
          set -euo pipefail
          SUPA_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')
          SUPA_ANON=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2- | tr -d '"')
          SUPA_SVC=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')
          if [ -z "$SUPA_URL" ] || [ -z "$SUPA_ANON" ] || [ -z "$SUPA_SVC" ]; then
            echo "::error::supabase status did not yield API_URL/ANON_KEY/SERVICE_ROLE_KEY"
            supabase status -o env
            exit 1
          fi
          {
            echo "SUPABASE_URL=$SUPA_URL"
            echo "SUPABASE_ANON_KEY=$SUPA_ANON"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPA_SVC"
            echo "SUPABASE_DB_TESTS=1"
          } >> "$GITHUB_ENV"
      - name: Force PostgREST schema cache reload + wait for WRITE path
        # `NOTIFY pgrst, 'reload schema'` am Ende einer Migration kann während
        # `supabase start` verloren gehen, wenn PostgREST den Listener noch
        # nicht aufgesetzt hat → PGRST204 für frisch hinzugefügte Spalten
        # (z.B. sessions.guest_count). Ein reiner SELECT-Poll wärmt nur den
        # Read-Path; der WRITE-Path (PATCH/UPDATE über PostgREST) kann noch
        # einen veralteten Schema-Cache haben. Daher hier den Write-Path
        # explizit testen: erst ein harmloses UPDATE in einer Transaktion
        # (sofort ROLLBACK), dann ein PATCH gegen PostgREST auf eine nicht
        # existierende id — der ändert nichts, prüft aber, dass guest_count
        # im Write-Path akzeptiert wird (kein PGRST204).
        run: |
          set -euo pipefail
          DB_URL=$(supabase status -o env | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          SUPA_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')
          SUPA_SVC=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')
          reload_postgrest_schema() {
            psql "$DB_URL" -c "NOTIFY pgrst, 'reload schema';"
            REST_CONTAINER=$(docker ps --filter "name=supabase_rest" --format "{{.Names}}" | head -n1 || true)
            if [ -n "$REST_CONTAINER" ]; then
              docker kill --signal=SIGUSR1 "$REST_CONTAINER" > /dev/null 2>&1 || true
            fi
          }

          reload_postgrest_schema
          for i in $(seq 1 30); do
            if psql "$DB_URL" -v ON_ERROR_STOP=1 -c \
               "BEGIN; UPDATE public.sessions SET guest_count = guest_count WHERE false; ROLLBACK;" \
               > /dev/null 2>&1; then
              if curl -sf -X PATCH "$SUPA_URL/rest/v1/sessions?id=eq.00000000-0000-0000-0000-000000000000" \
                  -H "apikey: $SUPA_SVC" \
                  -H "Authorization: Bearer $SUPA_SVC" \
                  -H "Content-Type: application/json" \
                  -H "Prefer: return=minimal" \
                  -d '{"guest_count":0}' > /dev/null 2>&1; then
                echo "PostgREST write-path cache aktuell (guest_count akzeptiert)"
                exit 0
              fi
            fi
            echo "Waiting for PostgREST write-path schema cache... ($i/30)"
            reload_postgrest_schema
            sleep 2
          done
          echo "::error::PostgREST write-path schema cache did not accept sessions.guest_count in time"
          exit 1
      - name: Run DB integration tests
        # Vitest-Positional-Args sind Substring-Filter, KEINE Globs
        # ("src/**/*.db.test.ts" liefert "No test files found"). Stattdessen
        # auf den Dateinamen-Stamm filtern — matcht alle *.db.test.ts.
        run: bun run vitest run .db.test
      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup || true
