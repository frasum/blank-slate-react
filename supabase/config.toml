# Verlinkung zum gehosteten Supabase-Projekt
project_id = "gyvblrdhutztbkoynnrq"

# Lokale Stack-Konfiguration für `supabase start` (CI: DB-Integrationstests).
# Cloud-Projekte werden hiervon NICHT beeinflusst.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = false

[edge_runtime]
enabled = false

[analytics]
enabled = false